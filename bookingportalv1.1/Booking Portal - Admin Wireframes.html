<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Booking Portal · Admin Wireframes — House of Champions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="screens-admin.jsx"></script>
<script type="text/babel" src="screens-admin2.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const W = 1240;

function App() {
  return (
    <DesignCanvas>

      <DCSection id="overview" title="Admin · Overview" subtitle="The hero — see & filter the whole building's day at a glance">
        <DCArtboard id="ov" label="1 · Overview — the floor right now" width={W} height={1040} style={{ background: 'var(--wf-paper)' }}><ScreenAdminOverview /></DCArtboard>
      </DCSection>

      <DCSection id="items" title="Bookable items" subtitle="List of desks & rooms → add / edit">
        <DCArtboard id="items-list" label="2 · Bookable items" width={W} height={930} style={{ background: 'var(--wf-paper)' }}><ScreenAdminItems /></DCArtboard>
        <DCArtboard id="items-edit" label="2 · Add / edit item" width={W} height={820} style={{ background: 'var(--wf-paper)' }}><ScreenAdminItemEdit /></DCArtboard>
      </DCSection>

      <DCSection id="calendar" title="Calendar management" subtitle="All spaces by the week · block-outs · exceptions · utilisation">
        <DCArtboard id="cal" label="3 · Calendar" width={W} height={880} style={{ background: 'var(--wf-paper)' }}><ScreenAdminCalendar /></DCArtboard>
      </DCSection>

      <DCSection id="plans" title="Plans & permission configuration" subtitle="Per-tier permission editor · add a tier">
        <DCArtboard id="plans-editor" label="4 · Plans & permissions" width={W} height={1110} style={{ background: 'var(--wf-paper)' }}><ScreenAdminPlans /></DCArtboard>
      </DCSection>

      <DCSection id="members" title="Member management" subtitle="Filterable list → member detail (plan, seats, history, overrides)">
        <DCArtboard id="mem-list" label="5 · Members list" width={W} height={780} style={{ background: 'var(--wf-paper)' }}><ScreenAdminMembers /></DCArtboard>
        <DCArtboard id="mem-detail" label="5 · Member detail" width={W} height={860} style={{ background: 'var(--wf-paper)' }}><ScreenAdminMemberDetail /></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
