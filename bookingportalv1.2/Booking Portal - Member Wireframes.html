<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Booking Portal · Member Wireframes — House of Champions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="screens-join.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-manage.jsx"></script>
<script type="text/babel" src="screens-mobile.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;
const W = 1240; // standard desktop frame width

function App() {
  return (
    <DesignCanvas>

      <DCSection id="system" title="Wireframe system" subtitle="How to read these · and the member-app navigation">
        <DCArtboard id="legend" label="Legend · how to read" width={560} height={720} style={{ background: 'var(--wf-paper)' }}><ScreenLegend /></DCArtboard>
        <DCArtboard id="nav" label="Navigation reference" width={W} height={640} style={{ background: 'var(--wf-paper)' }}><ScreenNav /></DCArtboard>
      </DCSection>

      <DCSection id="join" title="Join · acquisition" subtitle="Tier selection → sign-up (4 steps) → first sign-in">
        <DCArtboard id="tiers" label="1 · Tier selection" width={W} height={760} style={{ background: 'var(--wf-paper)' }}><ScreenTiers /></DCArtboard>
        <DCArtboard id="su1" label="2 · Sign-up · Account" width={1120} height={680} style={{ background: 'var(--wf-paper)' }}><ScreenSignup1 /></DCArtboard>
        <DCArtboard id="su2" label="2 · Sign-up · Profile" width={1120} height={680} style={{ background: 'var(--wf-paper)' }}><ScreenSignup2 /></DCArtboard>
        <DCArtboard id="su3" label="2 · Sign-up · Tier" width={1120} height={680} style={{ background: 'var(--wf-paper)' }}><ScreenSignup3 /></DCArtboard>
        <DCArtboard id="su4" label="2 · Sign-up · Billing hand-off" width={1120} height={700} style={{ background: 'var(--wf-paper)' }}><ScreenSignup4 /></DCArtboard>
        <DCArtboard id="login" label="3 · Log in" width={1120} height={620} style={{ background: 'var(--wf-paper)' }}><ScreenLogin /></DCArtboard>
        <DCArtboard id="forgot" label="3 · Forgot password" width={1120} height={620} style={{ background: 'var(--wf-paper)' }}><ScreenForgot /></DCArtboard>
      </DCSection>

      <DCSection id="home" title="Member home" subtitle="Dashboard — default & first-run">
        <DCArtboard id="dash" label="4 · Dashboard" width={W} height={880} style={{ background: 'var(--wf-paper)' }}><ScreenDashboard /></DCArtboard>
        <DCArtboard id="dash-empty" label="4 · Dashboard · empty state" width={W} height={720} style={{ background: 'var(--wf-paper)' }}><ScreenDashboardEmpty /></DCArtboard>
      </DCSection>

      <DCSection id="desk" title="Desk booking — end to end" subtitle="Browse (list) → review → confirmed">
        <DCArtboard id="desk-list" label="5 · Browse desks (list)" width={W} height={760} style={{ background: 'var(--wf-paper)' }}><ScreenDeskList /></DCArtboard>
        <DCArtboard id="desk-confirm" label="6 · Review & confirm" width={W} height={760} style={{ background: 'var(--wf-paper)' }}><ScreenDeskConfirm /></DCArtboard>
        <DCArtboard id="desk-done" label="6 · Confirmation" width={W} height={760} style={{ background: 'var(--wf-paper)' }}><ScreenDeskDone /></DCArtboard>
      </DCSection>

      <DCSection id="rooms" title="Meeting rooms — end to end" subtitle="Calendar + duration + capacity + add-ons → confirmed">
        <DCArtboard id="rooms-reserve" label="7 · Reserve a room" width={W} height={820} style={{ background: 'var(--wf-paper)' }}><ScreenRooms /></DCArtboard>
        <DCArtboard id="rooms-done" label="7 · Confirmation" width={W} height={700} style={{ background: 'var(--wf-paper)' }}><ScreenRoomsDone /></DCArtboard>
      </DCSection>

      <DCSection id="bookings" title="My bookings" subtitle="List → amend → cancel → cancelled">
        <DCArtboard id="bk-list" label="8 · Upcoming & past" width={W} height={880} style={{ background: 'var(--wf-paper)' }}><ScreenBookings /></DCArtboard>
        <DCArtboard id="bk-amend" label="8 · Amend booking" width={W} height={720} style={{ background: 'var(--wf-paper)' }}><ScreenAmend /></DCArtboard>
        <DCArtboard id="bk-cancel" label="8 · Cancel · confirm" width={W} height={880} style={{ background: 'var(--wf-paper)' }}><ScreenCancel /></DCArtboard>
        <DCArtboard id="bk-cancelled" label="8 · Cancelled · success" width={W} height={680} style={{ background: 'var(--wf-paper)' }}><ScreenCancelled /></DCArtboard>
      </DCSection>

      <DCSection id="account" title="Account & plan" subtitle="Profile & prefs → plan management → change summary → billing">
        <DCArtboard id="acct" label="9 · Account area" width={W} height={800} style={{ background: 'var(--wf-paper)' }}><ScreenAccount /></DCArtboard>
        <DCArtboard id="plan" label="10 · Plan management" width={W} height={820} style={{ background: 'var(--wf-paper)' }}><ScreenPlan /></DCArtboard>
        <DCArtboard id="plan-change" label="10 · Change summary" width={W} height={820} style={{ background: 'var(--wf-paper)' }}><ScreenPlanChange /></DCArtboard>
        <DCArtboard id="billing" label="12 · Billing & invoices" width={W} height={720} style={{ background: 'var(--wf-paper)' }}><ScreenBilling /></DCArtboard>
      </DCSection>

      <DCSection id="team" title="Team & seats — Account Admin only" subtitle="Roster + shared billing + oversight → invite a seat">
        <DCArtboard id="team-roster" label="11 · Seat roster & billing" width={W} height={820} style={{ background: 'var(--wf-paper)' }}><ScreenTeam /></DCArtboard>
        <DCArtboard id="team-invite" label="11 · Invite a seat" width={W} height={820} style={{ background: 'var(--wf-paper)' }}><ScreenInvite /></DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Responsive · mobile" subtitle="Book on the go — a handful of key screens">
        <DCArtboard id="m-dash" label="M · Dashboard" width={372} height={760} style={{ background: 'var(--wf-paper)' }}><MobileDashboard /></DCArtboard>
        <DCArtboard id="m-desks" label="M · Desk browse" width={372} height={760} style={{ background: 'var(--wf-paper)' }}><MobileDesks /></DCArtboard>
        <DCArtboard id="m-bookings" label="M · My bookings" width={372} height={760} style={{ background: 'var(--wf-paper)' }}><MobileBookings /></DCArtboard>
        <DCArtboard id="m-login" label="M · Log in" width={372} height={760} style={{ background: 'var(--wf-paper)' }}><MobileLogin /></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
