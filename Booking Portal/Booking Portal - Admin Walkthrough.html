<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Booking Portal · Admin Walkthrough — House of Champions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #15120D; overflow: hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="screens-admin.jsx"></script>
<script type="text/babel" src="screens-admin2.jsx"></script>
<script type="text/babel" src="slides-deck.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const W = 1240;

const slides = [
  { section: "Admin · overview",       title: "The floor right now",  label: "1 · Overview",              w: W, h: 1040, first: true, render: () => <ScreenAdminOverview /> },
  { section: "Bookable items",         title: "Bookable items",       label: "2 · Bookable items",        w: W, h: 930,  first: true, render: () => <ScreenAdminItems /> },
  { section: "Bookable items",         title: "Add / edit item",      label: "2 · Add / edit item",       w: W, h: 820,  render: () => <ScreenAdminItemEdit /> },
  { section: "Calendar management",    title: "Calendar",             label: "3 · Calendar",              w: W, h: 880,  first: true, render: () => <ScreenAdminCalendar /> },
  { section: "Plans & permissions",    title: "Plans & permissions",  label: "4 · Plans & permissions",   w: W, h: 1110, first: true, render: () => <ScreenAdminPlans /> },
  { section: "Member management",      title: "Members list",         label: "5 · Members list",          w: W, h: 780,  first: true, render: () => <ScreenAdminMembers /> },
  { section: "Member management",      title: "Member detail",        label: "5 · Member detail",         w: W, h: 860,  render: () => <ScreenAdminMemberDetail /> },
];

ReactDOM.createRoot(document.getElementById('root')).render(
  <SlideDeck deckTitle="Booking Portal" deckKind="Admin Walkthrough" slides={slides} storageKey="hoc-admin-deck" />
);
</script>
</body>
</html>
